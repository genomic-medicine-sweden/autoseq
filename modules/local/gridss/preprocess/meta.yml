name: "gridss_preprocess"
description: Preprocess BAM files for GRIDSS structural variant calling
keywords:
  - bam
  - preprocessing
  - structural variants
  - gridss
  - variant calling
tools:
  - gridss:
      description: GRIDSS is a module software suite containing tools useful for the detection of genomic rearrangements
      homepage: https://github.com/PapenfussLab/gridss
      documentation: https://github.com/PapenfussLab/gridss
      tool_dev_url: https://github.com/PapenfussLab/gridss
      doi: "10.1101/gr.222109.117"
      licence: ["GPL v3"]

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1', single_end:false ]`
  - bam:
      type: file
      description: Input BAM file
      pattern: "*.bam"
  - bai:
      type: file
      description: BAM index file
      pattern: "*.bam.bai"
  - meta2:
      type: map
      description: |
        Groovy Map containing genome fasta metadata
        e.g. `[ id:'genome' ]`
  - genome_fasta:
      type: file
      description: Reference genome FASTA file
      pattern: "*.{fasta,fa,fna}"
  - meta3:
      type: map
      description: |
        Groovy Map containing GRIDSS index metadata
        e.g. `[ id:'genome_gridss_index' ]`
  - genome_gridss_index:
      type: directory
      description: Directory containing GRIDSS/BWA index files for the reference genome
      pattern: "*"
  - meta4:
      type: map
      description: |
        Groovy Map containing genome FAI metadata
        e.g. `[ id:'genome_fai' ]`
  - genome_fai:
      type: file
      description: Reference genome FASTA index file
      pattern: "*.fai"
  - meta5:
      type: map
      description: |
        Groovy Map containing genome dictionary metadata
        e.g. `[ id:'genome_dict' ]`
  - genome_dict:
      type: file
      description: Reference genome sequence dictionary
      pattern: "*.dict"
  - gridss_config:
      type: file
      description: Optional GRIDSS configuration file
      pattern: "*.{properties,config}"

output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1', single_end:false ]`
  - preprocess_dir:
      type: directory
      description: GRIDSS preprocessing working directory containing intermediate files
      pattern: "*.gridss.working/"
  - versions_gridss:
      type: map
      description: Map containing the version of GRIDSS used in this process, keyed by process name
  - ${task.process}:
      type: string
      description: The process the versions were collected from
  - gridss:
      type: string
      description: The tool name
  - CallVariants --version 2>&1 | sed 's/-gridss\$//':
      type: eval
      description: The expression to obtain the version of the tool

authors:
  - "@imsarath"
maintainers:
  - "@imsarath"
