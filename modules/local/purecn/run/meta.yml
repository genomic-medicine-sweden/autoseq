name: "purecn_run"
description: Run PureCN workflow to normalize, segment and determine purity and ploidy
  using a pre-computed segmentation file from a third-party CNV caller
keywords:
  - copy number alteration calling
  - hybrid capture sequencing
  - targeted sequencing
  - DNA sequencing
tools:
  - "purecn":
      description: "Copy number calling and SNV classification using targeted short
        read sequencing"
      homepage: "https://bioconductor.org/packages/release/bioc/html/PureCN.html"
      documentation: "https://bioconductor.org/packages/release/bioc/html/PureCN.html"
      tool_dev_url: "https://github.com/lima1/PureCN"
      doi: "10.1186/s13029-016-0060-z"
      license: ["Artistic-2.0"]
      args_id: "$args"
      identifier: biotools:purecn
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test' ]
    - coverage:
        type: file
        description: Coverage file generated from Coverage.R
        pattern: "*.txt"
        ontologies: []
    - seg:
        type: file
        description: |
          Segmentation file from a third-party CNV caller (e.g. CNVkit .seg file).
          Passed to PureCN via --seg with --funsegmentation none to skip
          internal segmentation.
        pattern: "*.seg"
        ontologies: []
    - vcf:
        type: file
        description: VCF containing germline variant calls for allele frequency estimation
        pattern: "*.vcf.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989 # GZIP format
  - genome:
      type: string
      description: Genome build (e.g. hg19, hg38)
output:
  pdf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*.pdf":
          type: file
          description: PDF file containing copy number plots
          pattern: "*.pdf"
          ontologies: []
  local_optima_pdf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*_local_optima.pdf":
          type: file
          description: PDF file containing local optima plots
          pattern: "*_local_optima.pdf"
          ontologies: []
  csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*.csv":
          type: file
          description: |
            Tab-delimited file containing sample purity, ploidy
            and flags information
          pattern: "*.csv"
          ontologies: []
  seg:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*_dnacopy.seg":
          type: file
          description: |
            Tab-delimited file containing PureCN segmentation results. Optional.
          pattern: "*_dnacopy.seg"
          ontologies: []
  genes_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*_genes.csv":
          type: file
          description: CSV file containing gene-level copy number calls. Optional.
          pattern: "*_genes.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  amplification_pvalues_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*_amplification_pvalues.csv":
          type: file
          description: CSV file containing amplification p-values. Optional.
          pattern: "*_amplification_pvalues.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  vcf_gz:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*.vcf.gz":
          type: file
          description: GZipped VCF file containing SNV calls. Optional.
          pattern: "*.vcf.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  variants_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*_variants.csv":
          type: file
          description: CSV file containing SNV calls. Optional.
          pattern: "*_variants.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  loh_csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*_loh.csv":
          type: file
          description: CSV file containing LOH calls. Optional.
          pattern: "*_loh.csv"
          ontologies:
            - edam: http://edamontology.org/format_3752 # CSV
  chr_pdf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*_chromosomes.pdf":
          type: file
          description: PDF file containing per-chromosome plots. Optional.
          pattern: "*_chromosomes.pdf"
          ontologies: []
  segmentation_pdf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*_segmentation.pdf":
          type: file
          description: PDF file containing segmentation plots. Optional.
          pattern: "*_segmentation.pdf"
          ontologies: []
  multisample_seg:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*_multisample.seg":
          type: file
          description: Multisample segmentation results. Optional.
          pattern: "*_multisample.seg"
          ontologies: []
  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test' ]
      - "*.log":
          type: file
          description: Log file of the analysis. Optional.
          pattern: "*.log"
          ontologies: []
  versions_purecn:
    - - task.process:
          type: string
          description: Process name
      - "'PureCN'":
          type: string
          description: Tool name
      - version:
          type: string
          description: |
            PureCN version string emitted via Nextflow topic channel (versions_purecn).
            Not a file — consumed by the versions topic rather than published directly.

authors:
  - "@aldosr"
  - "@lbeltrame"
  - "@imsarath"
maintainers:
  - "@imsarath"
